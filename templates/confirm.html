<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подтверждение удаления</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
        height: 100vh;
        display: flex;
        align-items: center;
      }
      .card {
        border: none;
        border-radius: 20px;
        padding: 40px;
      }
      .warning-icon {
        font-size: 4rem;
        color: #ffc107;
        margin-bottom: 20px;
      }
      .btn-delete {
        background-color: #dc3545;
        border: none;
        padding: 12px 30px;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .btn-delete:hover {
        background-color: #bb2d3b;
        transform: scale(1.02);
      }
      .btn-cancel {
        padding: 12px 30px;
        border-radius: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 text-center">
          <div class="card shadow-lg">
            <div class="warning-icon">⚠️</div>
            <h2 class="fw-bold text-dark mb-3">Вы уверены?</h2>
            <p class="text-muted mb-4">
              Вы собираетесь удалить сотрудника <br />
              <strong class="text-dark">{{ object.full_name }}</strong>. <br />
              Это действие нельзя будет отменить.
            </p>

            <form method="post">
              {% csrf_token %}
              <div class="d-flex justify-content-center gap-3">
                <a
                  href="{% url 'list' %}"
                  class="btn btn-light border btn-cancel"
                  >Отмена</a
                >
                <button type="submit" class="btn btn-danger btn-delete">
                  Да, удалить
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
