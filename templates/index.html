<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Управление персоналом</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f4f7f6;
      }
      .employee-card {
        transition: transform 0.2s;
        border: none;
        border-radius: 15px;
      }
      .employee-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }
      .avatar {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .btn-add {
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="fw-bold text-dark m-0">Наши сотрудники</h1>
        <a href="{% url 'add' %}" class="btn btn-primary btn-add shadow-sm"
          >+ Добавить сотрудника</a
        >
      </div>

      <div class="row g-4">
        {% for e in employees %}
        <div class="col-md-6 col-lg-4">
          <div class="card employee-card shadow-sm h-100 p-3">
            <div class="d-flex align-items-center mb-3">
              {% if e.photo %}
              <img src="{{ e.photo.url }}" class="avatar me-3" alt="photo" />
              {% else %}
              <div
                class="avatar me-3 bg-secondary d-flex align-items-center justify-content-center text-white fw-bold"
              >
                {{ e.full_name|slice:":1" }}
              </div>
              {% endif %}

              <div>
                <h5 class="mb-0 fw-bold">{{ e.full_name }}</h5>
                <small class="text-muted">{{ e.position }}</small>
              </div>
            </div>

            <p class="text-muted small mb-3">
              Email: <span class="text-dark">{{ e.email }}</span>
            </p>

            <div class="d-flex gap-2 mt-auto">
              <a
                href="{% url 'edit' e.pk %}"
                class="btn btn-light btn-sm w-100 border"
                >Изменить</a
              >
              <a
                href="{% url 'delete' e.pk %}"
                class="btn btn-outline-danger btn-sm w-100"
                >Удалить</a
              >
            </div>
          </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
          <p class="text-muted">Сотрудников пока нет. Добавьте первого!</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
