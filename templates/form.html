<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Данные сотрудника</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
      }
      .card {
        border: none;
        border-radius: 15px;
      }
      .form-control,
      .form-select {
        border-radius: 8px;
        padding: 10px;
        border: 1px solid #dee2e6;
      }
      /* Исправленный блок фокуса */
      .form-control:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      }
      .btn-save {
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        background-color: #0d6efd;
        border: none;
        transition: all 0.3s ease;
      }
      .btn-save:hover {
        background-color: #0b5ed7;
        transform: translateY(-1px);
      }
      label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 5px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-lg p-4">
            <h2 class="fw-bold mb-4 text-center">Данные сотрудника</h2>

            <form method="post" enctype="multipart/form-data">
              {% csrf_token %} {% for field in form %}
              <div class="mb-3">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                <div class="custom-field">{{ field }}</div>
                {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors }}</div>
                {% endif %}
              </div>
              {% endfor %}

              <div class="d-grid gap-2 mt-4">
                <button
                  type="submit"
                  class="btn btn-primary btn-save shadow-sm"
                >
                  Сохранить данные
                </button>
                <a href="{% url 'list' %}" class="btn btn-light border py-2"
                  >Отмена</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Этот скрипт найдет все input и добавит им класс Bootstrap автоматически
      document.querySelectorAll("input, select").forEach((el) => {
        el.classList.add("form-control");
        if (el.type === "file") el.classList.add("form-control-file");
      });
    </script>
  </body>
</html>
